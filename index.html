<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <title>DeepSeek 流式助手</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: #000000;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            color: #ffffff;
        }

        /* 头部 */
        .header {
            background: #1c1c1e;
            padding: 16px 20px;
            border-bottom: 0.5px solid #2c2c2e;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-shrink: 0;
        }

        .header h1 {
            font-size: 20px;
            font-weight: 600;
            color: #ffffff;
        }

        .settings-btn, .clear-btn {
            background: none;
            border: none;
            font-size: 24px;
            cursor: pointer;
            padding: 6px;
            border-radius: 30px;
            transition: background 0.2s;
            color: #ffffff;
        }

        .settings-btn:hover, .clear-btn:hover {
            background: #2c2c2e;
        }

        /* 设置面板 */
        .settings-panel {
            background: #1c1c1e;
            padding: 16px 20px;
            border-bottom: 0.5px solid #2c2c2e;
            display: none;
            flex-shrink: 0;
        }

        .settings-panel.show {
            display: block;
        }

        .api-input-group {
            display: flex;
            gap: 10px;
            margin-bottom: 12px;
        }

        .api-input-group input {
            flex: 1;
            padding: 12px 14px;
            border: 0.5px solid #3a3a3c;
            border-radius: 12px;
            font-size: 16px;
            background: #0c0c0d;
            color: #ffffff;
            font-family: monospace;
        }

        .api-input-group input:focus {
            outline: none;
            border-color: #0a84ff;
            background: #1c1c1e;
        }

        .save-btn {
            background: #0a84ff;
            color: white;
            border: none;
            padding: 0 20px;
            border-radius: 12px;
            font-weight: 600;
            font-size: 16px;
            cursor: pointer;
        }

        .status-msg {
            font-size: 13px;
            color: #30d158;
            margin-top: 6px;
        }

        .status-msg.error {
            color: #ff453a;
        }

        /* 聊天区域 */
        .chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px 16px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            scroll-behavior: smooth;
        }

        /* 消息气泡 */
        .message {
            display: flex;
            flex-direction: column;
            max-width: 85%;
        }

        .message.user {
            align-self: flex-end;
        }

        .message.assistant {
            align-self: flex-start;
        }

        .bubble {
            padding: 12px 16px;
            border-radius: 22px;
            font-size: 16px;
            line-height: 1.45;
            word-wrap: break-word;
            white-space: pre-wrap;
        }

        /* 用户气泡：灰色底 + 白字 */
        .user .bubble {
            background: #2c2c2e;
            color: #ffffff;
            border-bottom-right-radius: 6px;
        }

        /* 助手气泡：黑色底 + 白字，带细边框 */
        .assistant .bubble {
            background: #000000;
            color: #ffffff;
            border: 0.5px solid #3a3a3c;
            border-bottom-left-radius: 6px;
        }

        .timestamp {
            font-size: 11px;
            color: #8e8e93;
            margin-top: 5px;
            margin-left: 12px;
            margin-right: 12px;
        }

        /* 输入区域 */
        .input-area {
            background: #1c1c1e;
            padding: 12px 16px 20px;
            border-top: 0.5px solid #2c2c2e;
            display: flex;
            gap: 12px;
            align-items: flex-end;
            flex-shrink: 0;
        }

        .input-area textarea {
            flex: 1;
            border: 0.5px solid #3a3a3c;
            border-radius: 24px;
            padding: 10px 16px;
            font-size: 16px;
            font-family: inherit;
            resize: none;
            max-height: 120px;
            background: #0c0c0d;
            color: #ffffff;
            line-height: 1.4;
        }

        .input-area textarea:focus {
            outline: none;
            border-color: #0a84ff;
            background: #1c1c1e;
        }

        .input-area textarea::placeholder {
            color: #8e8e93;
        }

        .send-btn {
            background: #0a84ff;
            border: none;
            width: 44px;
            height: 44px;
            border-radius: 30px;
            color: white;
            font-size: 20px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: opacity 0.2s;
        }

        .send-btn:active {
            opacity: 0.7;
        }

        .send-btn.disabled {
            background: #3a3a3c;
            pointer-events: none;
        }

        /* 流式输出时，光标闪烁效果 */
        .streaming-cursor {
            display: inline-block;
            width: 2px;
            height: 1.2em;
            background-color: #0a84ff;
            margin-left: 2px;
            vertical-align: middle;
            animation: blink 1s step-end infinite;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }

        .typing-indicator {
            display: flex;
            gap: 4px;
            padding: 12px 16px;
            background: #000000;
            border: 0.5px solid #3a3a3c;
            border-radius: 22px;
            border-bottom-left-radius: 6px;
            width: fit-content;
        }

        .typing-indicator span {
            width: 8px;
            height: 8px;
            background: #8e8e93;
            border-radius: 50%;
            animation: bounce 1.4s infinite;
        }

        .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
        .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }

        @keyframes bounce {
            0%, 60%, 100% { transform: translateY(0); }
            30% { transform: translateY(-6px); }
        }
    </style>
</head>
<body>

<div class="header">
    <h1>DeepSeek 流式助手</h1>
    <div>
        <button class="clear-btn" id="clearChatBtn" title="清空对话">🗑️</button>
        <button class="settings-btn" id="settingsBtn">⚙️</button>
    </div>
</div>

<div class="settings-panel" id="settingsPanel">
    <div class="api-input-group">
        <input type="password" id="apiKeyInput" placeholder="输入你的 DeepSeek API Key (sk-...)" autocomplete="off">
        <button class="save-btn" id="saveApiKeyBtn">保存</button>
    </div>
    <div id="apiStatusMsg" class="status-msg"></div>
    <div style="font-size: 12px; color: #8e8e93; margin-top: 8px;">
        💡 API Key 仅保存在本浏览器中，不会上传。
    </div>
</div>

<div class="chat-container" id="chatContainer">
    <div class="message assistant">
        <div class="bubble">👋 你好！请先设置 API Key，然后开始对话。<br>✨ 支持流式输出，逐字显示。</div>
        <div class="timestamp"></div>
    </div>
</div>

<div class="input-area">
    <textarea id="messageInput" rows="1" placeholder="输入消息..." disabled></textarea>
    <button class="send-btn" id="sendBtn" disabled>➤</button>
</div>

<script>
    // DOM 元素
    const chatContainer = document.getElementById('chatContainer');
    const messageInput = document.getElementById('messageInput');
    const sendBtn = document.getElementById('sendBtn');
    const settingsBtn = document.getElementById('settingsBtn');
    const settingsPanel = document.getElementById('settingsPanel');
    const saveApiKeyBtn = document.getElementById('saveApiKeyBtn');
    const apiKeyInput = document.getElementById('apiKeyInput');
    const apiStatusMsg = document.getElementById('apiStatusMsg');
    const clearChatBtn = document.getElementById('clearChatBtn');

    // 全局变量
    let apiKey = localStorage.getItem('deepseek_api_key') || '';
    let messagesHistory = [];     // 存储 { role, content }
    let isLoading = false;        // 是否正在请求
    let currentStreamingMessageDiv = null;  // 当前正在流式渲染的消息DOM
    let currentStreamingContent = '';       // 已累积的文本
    let abortController = null;    // 用于中断请求

    // 初始化
    if (apiKey) {
        apiKeyInput.value = '••••••••';
        enableInputs(true);
        showStatus('✅ API Key 已加载', false);
        loadChatHistory();
    } else {
        enableInputs(false);
        showStatus('⚠️ 请先设置 API Key', true);
        settingsPanel.classList.add('show');
    }

    function loadChatHistory() {
        const saved = localStorage.getItem('chat_history');
        if (saved) {
            try {
                const history = JSON.parse(saved);
                if (Array.isArray(history) && history.length) {
                    messagesHistory = history;
                    renderMessagesFromHistory();
                }
            } catch(e) {}
        }
    }

    function saveChatHistory() {
        const toSave = messagesHistory.slice(-50);
        localStorage.setItem('chat_history', JSON.stringify(toSave));
    }

    function renderMessagesFromHistory() {
        chatContainer.innerHTML = '';
        if (messagesHistory.length === 0) {
            const welcomeDiv = document.createElement('div');
            welcomeDiv.className = 'message assistant';
            welcomeDiv.innerHTML = `<div class="bubble">👋 你好！请先设置 API Key，然后开始对话。<br>✨ 支持流式输出，逐字显示。</div><div class="timestamp"></div>`;
            chatContainer.appendChild(welcomeDiv);
        } else {
            messagesHistory.forEach(msg => {
                appendMessageToUI(msg.role, msg.content, false);
            });
        }
        scrollToBottom();
    }

    function enableInputs(enabled) {
        messageInput.disabled = !enabled;
        sendBtn.disabled = !enabled;
        messageInput.placeholder = enabled ? "输入消息..." : "请先设置 API Key";
    }

    function showStatus(msg, isError = false) {
        apiStatusMsg.textContent = msg;
        apiStatusMsg.className = isError ? 'status-msg error' : 'status-msg';
        setTimeout(() => {
            if (apiStatusMsg.textContent === msg) {
                if (!isError) apiStatusMsg.textContent = '';
            }
        }, 3000);
    }

    // 保存 API Key
    saveApiKeyBtn.addEventListener('click', () => {
        let newKey = apiKeyInput.value.trim();
        if (!newKey) {
            showStatus('❌ 请输入有效的 API Key', true);
            return;
        }
        if (newKey === '••••••••' && apiKey) {
            newKey = apiKey;
        }
        if (!newKey.startsWith('sk-')) {
            showStatus('❌ API Key 格式错误，应以 sk- 开头', true);
            return;
        }
        apiKey = newKey;
        localStorage.setItem('deepseek_api_key', apiKey);
        apiKeyInput.value = '••••••••';
        showStatus('✅ API Key 保存成功', false);
        enableInputs(true);
        settingsPanel.classList.remove('show');
    });

    // 清空对话
    clearChatBtn.addEventListener('click', () => {
        if (confirm('清空所有对话历史？')) {
            messagesHistory = [];
            saveChatHistory();
            chatContainer.innerHTML = '';
            const welcomeDiv = document.createElement('div');
            welcomeDiv.className = 'message assistant';
            welcomeDiv.innerHTML = `<div class="bubble">✨ 对话已清空，可以开始新话题了。</div><div class="timestamp"></div>`;
            chatContainer.appendChild(welcomeDiv);
            scrollToBottom();
        }
    });

    settingsBtn.addEventListener('click', () => {
        settingsPanel.classList.toggle('show');
        if (settingsPanel.classList.contains('show') && apiKey) {
            apiKeyInput.value = '••••••••';
        } else if (!settingsPanel.classList.contains('show') && !apiKey) {
            showStatus('⚠️ 必须先设置 API Key', true);
        }
    });

    // 添加普通消息（非流式，用于历史渲染或错误）
    function appendMessageToUI(role, content, isError = false) {
        const messageDiv = document.createElement('div');
        messageDiv.className = `message ${role}`;
        messageDiv.innerHTML = `
            <div class="bubble">${escapeHtml(content)}</div>
            <div class="timestamp">${new Date().toLocaleTimeString()}</div>
        `;
        chatContainer.appendChild(messageDiv);
        scrollToBottom();
        return messageDiv;
    }

    // 流式输出：创建或获取当前助手消息容器
    function getOrCreateStreamingMessage() {
        if (currentStreamingMessageDiv && currentStreamingMessageDiv.parentNode) {
            return currentStreamingMessageDiv;
        }
        const messageDiv = document.createElement('div');
        messageDiv.className = 'message assistant';
        const bubbleDiv = document.createElement('div');
        bubbleDiv.className = 'bubble';
        messageDiv.appendChild(bubbleDiv);
        const timeSpan = document.createElement('div');
        timeSpan.className = 'timestamp';
        timeSpan.textContent = new Date().toLocaleTimeString();
        messageDiv.appendChild(timeSpan);
        chatContainer.appendChild(messageDiv);
        currentStreamingMessageDiv = messageDiv;
        return currentStreamingMessageDiv;
    }

    // 更新流式内容（追加新文本）
    function appendStreamingContent(chunkText) {
        currentStreamingContent += chunkText;
        const bubble = currentStreamingMessageDiv.querySelector('.bubble');
        // 显示已累积内容 + 光标（如果还在流式）
        if (isLoading) {
            bubble.innerHTML = escapeHtml(currentStreamingContent) + '<span class="streaming-cursor"></span>';
        } else {
            bubble.innerHTML = escapeHtml(currentStreamingContent);
        }
        scrollToBottom();
    }

    // 结束流式，移除光标，保存内容到历史
    function finishStreaming(saveToHistory = true) {
        if (!currentStreamingMessageDiv) return;
        const bubble = currentStreamingMessageDiv.querySelector('.bubble');
        // 移除光标
        bubble.innerHTML = escapeHtml(currentStreamingContent);
        if (saveToHistory && currentStreamingContent.trim() !== '') {
            messagesHistory.push({ role: 'assistant', content: currentStreamingContent });
            saveChatHistory();
        }
        // 重置流式变量
        currentStreamingMessageDiv = null;
        currentStreamingContent = '';
    }

    function escapeHtml(text) {
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML.replace(/\n/g, '<br>');
    }

    function scrollToBottom() {
        chatContainer.scrollTop = chatContainer.scrollHeight;
    }

    // 发送消息（流式）
    async function sendMessage() {
        if (isLoading) return;
        const userText = messageInput.value.trim();
        if (!userText) return;
        if (!apiKey) {
            showStatus('❌ 请先设置 API Key', true);
            settingsPanel.classList.add('show');
            return;
        }

        // 添加用户消息到界面和历史
        appendMessageToUI('user', userText);
        messagesHistory.push({ role: 'user', content: userText });
        saveChatHistory();

        messageInput.value = '';
        autoResizeTextarea();
        isLoading = true;
        sendBtn.classList.add('disabled');

        // 准备请求
        const contextMessages = messagesHistory.slice(-20);
        abortController = new AbortController();

        try {
            const response = await fetch('https://api.deepseek.com/v1/chat/completions', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${apiKey}`
                },
                body: JSON.stringify({
                    model: 'deepseek-chat',
                    messages: contextMessages,
                    stream: true,      // 开启流式
                    temperature: 0.7,
                    max_tokens: 2000
                }),
                signal: abortController.signal
            });

            if (!response.ok) {
                let errorDetail = `HTTP ${response.status}`;
                try {
                    const errData = await response.json();
                    errorDetail = errData.error?.message || errorDetail;
                } catch(e) {}
                throw new Error(`API 错误: ${errorDetail}`);
            }

            // 处理流式响应
            const reader = response.body.getReader();
            const decoder = new TextDecoder('utf-8');
            let buffer = '';
            let isFirstChunk = true;

            while (true) {
                const { done, value } = await reader.read();
                if (done) break;
                
                buffer += decoder.decode(value, { stream: true });
                const lines = buffer.split('\n');
                buffer = lines.pop(); // 保留不完整的行

                for (const line of lines) {
                    const trimmed = line.trim();
                    if (trimmed === '') continue;
                    if (trimmed === 'data: [DONE]') continue;
                    if (trimmed.startsWith('data: ')) {
                        const jsonStr = trimmed.slice(6);
                        try {
                            const data = JSON.parse(jsonStr);
                            const delta = data.choices[0]?.delta?.content;
                            if (delta) {
                                if (isFirstChunk) {
                                    // 创建流式消息容器
                                    getOrCreateStreamingMessage();
                                    isFirstChunk = false;
                                }
                                appendStreamingContent(delta);
                            }
                        } catch (e) {
                            console.warn('JSON解析失败', e);
                        }
                    }
                }
            }
            // 流式结束，完成消息
            finishStreaming(true);
        } catch (error) {
            console.error('请求失败:', error);
            if (error.name === 'AbortError') {
                // 用户取消了请求，不做额外提示
                finishStreaming(false);
            } else {
                // 显示错误消息
                if (currentStreamingMessageDiv) {
                    // 如果有流式容器，显示错误
                    const bubble = currentStreamingMessageDiv.querySelector('.bubble');
                    bubble.innerHTML = escapeHtml(`❌ 出错了: ${error.message}\n\n请检查：\n1. API Key 是否正确\n2. 账户是否有余额\n3. 网络是否正常`);
                    finishStreaming(false);
                } else {
                    appendMessageToUI('assistant', `❌ 出错了: ${error.message}`, true);
                }
            }
        } finally {
            isLoading = false;
            sendBtn.classList.remove('disabled');
            abortController = null;
            scrollToBottom();
        }
    }

    function autoResizeTextarea() {
        messageInput.style.height = 'auto';
        messageInput.style.height = Math.min(120, messageInput.scrollHeight) + 'px';
    }

    messageInput.addEventListener('input', autoResizeTextarea);
    messageInput.addEventListener('keydown', (e) => {
        if (e.key === 'Enter' && !e.shiftKey) {
            e.preventDefault();
            if (!isLoading && messageInput.value.trim()) sendMessage();
        }
    });
    sendBtn.addEventListener('click', sendMessage);
    scrollToBottom();
</script>
</body>
</html>
