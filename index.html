<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <title>DeepSeek 私人助手</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #f5f5f7;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* 头部 */
        .header {
            background: #ffffff;
            padding: 16px 20px;
            border-bottom: 0.5px solid #e9e9ef;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-shrink: 0;
        }

        .header h1 {
            font-size: 20px;
            font-weight: 600;
            color: #1c1c1e;
        }

        .settings-btn, .clear-btn {
            background: none;
            border: none;
            font-size: 24px;
            cursor: pointer;
            padding: 6px;
            border-radius: 30px;
            transition: background 0.2s;
        }

        .settings-btn:hover, .clear-btn:hover {
            background: #e9e9ef;
        }

        /* 设置面板 */
        .settings-panel {
            background: #ffffff;
            padding: 16px 20px;
            border-bottom: 0.5px solid #e9e9ef;
            display: none;
            flex-shrink: 0;
        }

        .settings-panel.show {
            display: block;
        }

        .api-input-group {
            display: flex;
            gap: 10px;
            margin-bottom: 12px;
        }

        .api-input-group input {
            flex: 1;
            padding: 12px 14px;
            border: 0.5px solid #c6c6c8;
            border-radius: 12px;
            font-size: 16px;
            background: #f9f9fb;
            font-family: monospace;
        }

        .api-input-group input:focus {
            outline: none;
            border-color: #007aff;
            background: #ffffff;
        }

        .save-btn {
            background: #007aff;
            color: white;
            border: none;
            padding: 0 20px;
            border-radius: 12px;
            font-weight: 600;
            font-size: 16px;
            cursor: pointer;
        }

        .status-msg {
            font-size: 13px;
            color: #34c759;
            margin-top: 6px;
        }

        .status-msg.error {
            color: #ff3b30;
        }

        /* 聊天区域 */
        .chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px 16px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            scroll-behavior: smooth;
        }

        /* 消息气泡 */
        .message {
            display: flex;
            flex-direction: column;
            max-width: 85%;
        }

        .message.user {
            align-self: flex-end;
        }

        .message.assistant {
            align-self: flex-start;
        }

        .bubble {
            padding: 12px 16px;
            border-radius: 22px;
            font-size: 16px;
            line-height: 1.45;
            word-wrap: break-word;
            white-space: pre-wrap;
        }

        .user .bubble {
            background: #007aff;
            color: white;
            border-bottom-right-radius: 6px;
        }

        .assistant .bubble {
            background: #e5e5ea;
            color: #000000;
            border-bottom-left-radius: 6px;
        }

        .timestamp {
            font-size: 11px;
            color: #8e8e93;
            margin-top: 5px;
            margin-left: 12px;
            margin-right: 12px;
        }

        /* 输入区域 */
        .input-area {
            background: #ffffff;
            padding: 12px 16px 20px;
            border-top: 0.5px solid #e9e9ef;
            display: flex;
            gap: 12px;
            align-items: flex-end;
            flex-shrink: 0;
        }

        .input-area textarea {
            flex: 1;
            border: 0.5px solid #c6c6c8;
            border-radius: 24px;
            padding: 10px 16px;
            font-size: 16px;
            font-family: inherit;
            resize: none;
            max-height: 120px;
            background: #f9f9fb;
            line-height: 1.4;
        }

        .input-area textarea:focus {
            outline: none;
            border-color: #007aff;
            background: #ffffff;
        }

        .send-btn {
            background: #007aff;
            border: none;
            width: 44px;
            height: 44px;
            border-radius: 30px;
            color: white;
            font-size: 20px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: opacity 0.2s;
        }

        .send-btn:active {
            opacity: 0.7;
        }

        .send-btn.disabled {
            background: #c6c6c8;
            pointer-events: none;
        }

        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 2px solid #e5e5ea;
            border-top-color: #007aff;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .typing-indicator {
            display: flex;
            gap: 4px;
            padding: 12px 16px;
            background: #e5e5ea;
            border-radius: 22px;
            border-bottom-left-radius: 6px;
            width: fit-content;
        }

        .typing-indicator span {
            width: 8px;
            height: 8px;
            background: #8e8e93;
            border-radius: 50%;
            animation: bounce 1.4s infinite;
        }

        .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
        .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }

        @keyframes bounce {
            0%, 60%, 100% { transform: translateY(0); }
            30% { transform: translateY(-6px); }
        }
    </style>
</head>
<body>

<div class="header">
    <h1>DeepSeek 助手</h1>
    <div>
        <button class="clear-btn" id="clearChatBtn" title="清空对话">🗑️</button>
        <button class="settings-btn" id="settingsBtn">⚙️</button>
    </div>
</div>

<div class="settings-panel" id="settingsPanel">
    <div class="api-input-group">
        <input type="password" id="apiKeyInput" placeholder="输入你的 DeepSeek API Key (sk-...)" autocomplete="off">
        <button class="save-btn" id="saveApiKeyBtn">保存</button>
    </div>
    <div id="apiStatusMsg" class="status-msg"></div>
    <div style="font-size: 12px; color: #8e8e93; margin-top: 8px;">
        💡 API Key 仅保存在本浏览器中，不会上传。请勿在公开设备使用。
    </div>
</div>

<div class="chat-container" id="chatContainer">
    <div class="message assistant">
        <div class="bubble">👋 你好！请在右上角设置中填入你的 DeepSeek API Key，然后开始对话。</div>
        <div class="timestamp"></div>
    </div>
</div>

<div class="input-area">
    <textarea id="messageInput" rows="1" placeholder="输入消息..." disabled></textarea>
    <button class="send-btn" id="sendBtn" disabled>➤</button>
</div>

<script>
    // ---------- DOM 元素 ----------
    const chatContainer = document.getElementById('chatContainer');
    const messageInput = document.getElementById('messageInput');
    const sendBtn = document.getElementById('sendBtn');
    const settingsBtn = document.getElementById('settingsBtn');
    const settingsPanel = document.getElementById('settingsPanel');
    const saveApiKeyBtn = document.getElementById('saveApiKeyBtn');
    const apiKeyInput = document.getElementById('apiKeyInput');
    const apiStatusMsg = document.getElementById('apiStatusMsg');
    const clearChatBtn = document.getElementById('clearChatBtn');

    // ---------- 全局变量 ----------
    let apiKey = localStorage.getItem('deepseek_api_key') || '';
    let messagesHistory = [];     // 存储 { role, content }
    let isLoading = false;        // 是否正在请求
    let currentAssistantMessageDiv = null; // 用于流式渲染（这里用普通非流式，但保留占位）

    // ---------- 初始化加载 API Key ----------
    if (apiKey) {
        apiKeyInput.value = '••••••••';
        enableInputs(true);
        showStatus('✅ API Key 已加载', false);
        // 加载历史对话（如果有）
        loadChatHistory();
    } else {
        enableInputs(false);
        showStatus('⚠️ 请先设置 API Key', true);
        settingsPanel.classList.add('show');
    }

    // 加载聊天记录（可选）
    function loadChatHistory() {
        const saved = localStorage.getItem('chat_history');
        if (saved) {
            try {
                const history = JSON.parse(saved);
                if (Array.isArray(history) && history.length) {
                    messagesHistory = history;
                    renderMessagesFromHistory();
                }
            } catch(e) {}
        }
    }

    function saveChatHistory() {
        // 只保留最近50条消息，避免过大
        const toSave = messagesHistory.slice(-50);
        localStorage.setItem('chat_history', JSON.stringify(toSave));
    }

    function renderMessagesFromHistory() {
        chatContainer.innerHTML = '';
        if (messagesHistory.length === 0) {
            // 显示默认欢迎
            const welcomeDiv = document.createElement('div');
            welcomeDiv.className = 'message assistant';
            welcomeDiv.innerHTML = `<div class="bubble">👋 你好！有什么可以帮你的？</div><div class="timestamp"></div>`;
            chatContainer.appendChild(welcomeDiv);
        } else {
            messagesHistory.forEach(msg => {
                appendMessageToUI(msg.role, msg.content, false);
            });
        }
        scrollToBottom();
    }

    // 启用/禁用输入控件
    function enableInputs(enabled) {
        messageInput.disabled = !enabled;
        sendBtn.disabled = !enabled;
        if (enabled) {
            messageInput.placeholder = "输入消息...";
        } else {
            messageInput.placeholder = "请先设置 API Key";
        }
    }

    function showStatus(msg, isError = false) {
        apiStatusMsg.textContent = msg;
        apiStatusMsg.className = isError ? 'status-msg error' : 'status-msg';
        setTimeout(() => {
            if (apiStatusMsg.textContent === msg) {
                if (!isError) apiStatusMsg.textContent = '';
            }
        }, 3000);
    }

    // 保存 API Key
    saveApiKeyBtn.addEventListener('click', () => {
        let newKey = apiKeyInput.value.trim();
        if (!newKey) {
            showStatus('❌ 请输入有效的 API Key', true);
            return;
        }
        // 如果是掩码显示，且用户没修改，保留原key
        if (newKey === '••••••••' && apiKey) {
            newKey = apiKey;
        }
        if (!newKey.startsWith('sk-')) {
            showStatus('❌ API Key 格式错误，应以 sk- 开头', true);
            return;
        }
        apiKey = newKey;
        localStorage.setItem('deepseek_api_key', apiKey);
        apiKeyInput.value = '••••••••';
        showStatus('✅ API Key 保存成功', false);
        enableInputs(true);
        settingsPanel.classList.remove('show');
    });

    // 清空对话
    clearChatBtn.addEventListener('click', () => {
        if (confirm('清空所有对话历史？')) {
            messagesHistory = [];
            saveChatHistory();
            chatContainer.innerHTML = '';
            const welcomeDiv = document.createElement('div');
            welcomeDiv.className = 'message assistant';
            welcomeDiv.innerHTML = `<div class="bubble">✨ 对话已清空，可以开始新话题了。</div><div class="timestamp"></div>`;
            chatContainer.appendChild(welcomeDiv);
            scrollToBottom();
        }
    });

    // 设置面板开关
    settingsBtn.addEventListener('click', () => {
        settingsPanel.classList.toggle('show');
        if (settingsPanel.classList.contains('show') && apiKey) {
            apiKeyInput.value = '••••••••';
        } else if (!settingsPanel.classList.contains('show') && !apiKey) {
            showStatus('⚠️ 必须先设置 API Key', true);
        }
    });

    // 发送消息
    async function sendMessage() {
        if (isLoading) return;
        const userText = messageInput.value.trim();
        if (!userText) return;
        if (!apiKey) {
            showStatus('❌ 请先设置 API Key', true);
            settingsPanel.classList.add('show');
            return;
        }

        // 添加用户消息到UI和历史
        appendMessageToUI('user', userText);
        messagesHistory.push({ role: 'user', content: userText });
        saveChatHistory();

        messageInput.value = '';
        autoResizeTextarea();
        isLoading = true;
        sendBtn.classList.add('disabled');

        // 显示加载中指示器
        const loadingId = showTypingIndicator();

        try {
            // 构建请求消息（保留最近上下文，最多最近20条消息避免超长）
            let contextMessages = messagesHistory.slice(-20);
            const response = await fetch('https://api.deepseek.com/v1/chat/completions', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${apiKey}`
                },
                body: JSON.stringify({
                    model: 'deepseek-chat',
                    messages: contextMessages,
                    stream: false,
                    temperature: 0.7,
                    max_tokens: 2000
                })
            });

            removeTypingIndicator(loadingId);

            if (!response.ok) {
                let errorDetail = `HTTP ${response.status}`;
                try {
                    const errData = await response.json();
                    errorDetail = errData.error?.message || errorDetail;
                } catch(e) {}
                throw new Error(`API 错误: ${errorDetail}`);
            }

            const data = await response.json();
            const assistantReply = data.choices[0]?.message?.content || '（没有回复内容）';
            
            // 添加助手回复到UI和历史
            appendMessageToUI('assistant', assistantReply);
            messagesHistory.push({ role: 'assistant', content: assistantReply });
            saveChatHistory();
            
        } catch (error) {
            console.error('请求失败:', error);
            removeTypingIndicator(loadingId);
            appendMessageToUI('assistant', `❌ 出错了: ${error.message}\n\n请检查：\n1. API Key 是否正确\n2. 账户是否有余额\n3. 网络是否正常`, true);
        } finally {
            isLoading = false;
            sendBtn.classList.remove('disabled');
            scrollToBottom();
        }
    }

    // 显示“正在输入”动画，返回ID用于移除
    function showTypingIndicator() {
        const tempDiv = document.createElement('div');
        tempDiv.className = 'message assistant';
        tempDiv.id = `typing-${Date.now()}`;
        tempDiv.innerHTML = `<div class="typing-indicator"><span></span><span></span><span></span></div>`;
        chatContainer.appendChild(tempDiv);
        scrollToBottom();
        return tempDiv.id;
    }

    function removeTypingIndicator(id) {
        const el = document.getElementById(id);
        if (el) el.remove();
    }

    // 添加消息到界面（不存历史，仅渲染）
    function appendMessageToUI(role, content, isError = false) {
        const messageDiv = document.createElement('div');
        messageDiv.className = `message ${role}`;
        const bubbleClass = isError ? 'bubble' : 'bubble';
        messageDiv.innerHTML = `
            <div class="${bubbleClass}">${escapeHtml(content)}</div>
            <div class="timestamp">${new Date().toLocaleTimeString()}</div>
        `;
        chatContainer.appendChild(messageDiv);
        scrollToBottom();
    }

    // 简单的防XSS
    function escapeHtml(text) {
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML.replace(/\n/g, '<br>');
    }

    function scrollToBottom() {
        chatContainer.scrollTop = chatContainer.scrollHeight;
    }

    // 自动调整输入框高度
    function autoResizeTextarea() {
        messageInput.style.height = 'auto';
        messageInput.style.height = Math.min(120, messageInput.scrollHeight) + 'px';
    }

    messageInput.addEventListener('input', autoResizeTextarea);
    messageInput.addEventListener('keydown', (e) => {
        if (e.key === 'Enter' && !e.shiftKey) {
            e.preventDefault();
            if (!isLoading && messageInput.value.trim()) sendMessage();
        }
    });

    sendBtn.addEventListener('click', sendMessage);

    // 初始滚动到底部
    scrollToBottom();
</script>
</body>
</html>
